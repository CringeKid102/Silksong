name: Build macOS app

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pygame opencv-python

      - name: Build app bundle
        run: pyinstaller Silksong.macos.spec --noconfirm --clean

      - name: Zip app bundle
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent Silksong.app Silksong-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Silksong-macOS
          path: dist/Silksong-macOS.zip
